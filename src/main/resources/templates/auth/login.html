<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">
<title>Login - KnowVault</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f6fa;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-card{
    background:white;
    padding:40px;
    width:380px;
    border-radius:10px;
    box-shadow:0 4px 14px rgba(0,0,0,0.08);
}

.logo{
    font-size:24px;
    font-weight:bold;
    margin-bottom:10px;
}

.subtitle{
    color:#666;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:6px;
    font-size:14px;
}

input{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:1px solid #ddd;
}

input:focus{
    outline:none;
    border-color:#2563eb;
}

button{
    width:100%;
    background:#2563eb;
    border:none;
    padding:12px;
    color:white;
    border-radius:6px;
    cursor:pointer;
    font-size:15px;
}

button:hover{
    background:#1e4fd6;
}

.error{
    color:#ef4444;
    font-size:13px;
    margin-bottom:10px;
}

</style>

</head>

<body>

<div class="login-card">

<div class="logo">KnowVault</div>
<div class="subtitle">Sign in to your account</div>

<form th:action="@{/login}" method="post" th:object="${form}">

<div class="input-group">
<label>Email</label>
<input type="email" th:field="*{email}">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" th:field="*{password}">
</div>

<div class="error" th:if="${loginError}" th:text="${loginError}"></div>

<button type="submit">
Sign In
</button>

</form>

</div>

</body>
</html>
