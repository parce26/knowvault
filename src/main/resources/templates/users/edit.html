<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<title>Editar User</title>
</head>
<body>
<h1>Editar usuario</h1>

<form th:action="@{/users/{id}(id=${userId})}" method="post" th:object="${form}">
<div>
    <label>Username</label>
    <input type="text" th:field="*{username}" />
    <div th:if="${#fields.hasErrors('username')}" th:errors="*{username}" style="color:red;"></div>
</div>

<div>
    <label>Email</label>
    <input type="email" th:field="*{email}" />
    <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color:red;"></div>
</div>

<div>
    <label>Password (opcional)</label>
    <input type="password" th:field="*{password}" placeholder="Dejar vacío para no cambiar" />
    <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color:red;"></div>
</div>

<div>
    <label>Role</label>
    <select th:field="*{role}">
    <option value="user">user</option>
    <option value="admin">admin</option>
    </select>
    <div th:if="${#fields.hasErrors('role')}" th:errors="*{role}" style="color:red;"></div>
</div>

<button type="submit">Guardar</button>
<a th:href="@{/users}">Volver</a>
</form>

</body>
</html>
