<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KnowVault - Upload Document</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<div class="header">
    <a href="/dashboard" class="logo-container">
        <img src="/images/logo.png" alt="KnowVault" class="logo-img">
    </a>

    <div class="search-container">
        <span class="search-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
            </svg>
        </span>
        <input type="text" class="search-input" placeholder="Search documents...">
    </div>

    <div class="header-actions">
        <button class="notification-btn">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                <path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6z"/>
            </svg>
            <span class="notification-badge"></span>
        </button>

        <div class="user-avatar-container">
            <div class="user-avatar">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M12 12C14.7614 12 17 9.76142 17 7C17 4.23858 14.7614 2 12 2C9.23858 2 7 4.23858 7 7C7 9.76142 9.23858 12 12 12Z" fill="white"/>
                    <path d="M12 14C6.47715 14 2 18.4772 2 24H22C22 18.4772 17.5228 14 12 14Z" fill="white" opacity="0.9"/>
                </svg>
            </div>
        </div>
    </div>
</div>

<div class="sidebar">
    <nav class="nav-section">
        <a href="/dashboard" class="nav-item">
            <span class="nav-icon">
                <svg viewBox="0 0 20 20" fill="currentColor">
                    <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/>
                </svg>
            </span>
            <span>Home</span>
        </a>

        <a href="/documents" class="nav-item active">
            <span class="nav-icon">
                <svg viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd"/>
                </svg>
            </span>
            <span>Upload Document</span>
        </a>

        <a href="/history" class="nav-item">
            <span class="nav-icon">
                <svg viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"/>
                </svg>
            </span>
            <span>History</span>
        </a>
    </nav>
</div>

<div class="main-content">

    <div class="page-header">
        <h1 class="page-title">Upload Document</h1>
        <p class="page-subtitle">Add new documents to your knowledge base</p>
    </div>

    <div class="content-card">

        <form
                th:action="@{/documents/upload}"
                method="post"
                th:object="${form}"
                enctype="multipart/form-data">

            <div class="form-group">
                <label class="form-label">Document Title</label>
                <input type="text"
                       th:field="*{title}"
                       class="form-input"
                       placeholder="Enter document title"
                       required>
            </div>

            <div class="form-group">
                <label class="form-label">Category</label>
                <select th:field="*{category}" class="form-input">
                    <option value="">No category</option>
                    <option value="business">Business</option>
                    <option value="technical">Technical</option>
                    <option value="legal">Legal</option>
                    <option value="financial">Financial</option>
                    <option value="hr">Human Resources</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Upload File</label>
                <input type="file"
                       th:field="*{file}"
                       class="form-input"
                       accept=".pdf,.doc,.docx,.txt,.xls,.xlsx"
                       required>
            </div>

            <div class="form-actions">
                <a class="btn-secondary" th:href="@{/documents}">Cancel</a>
                <button type="submit" class="btn-primary">Upload Document</button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
