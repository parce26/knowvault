<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KnowVault — Upload Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --blue: #0052FF; --blue-dark: #003ACC; --blue-light: #EBF1FF;
            --bg: #F7F9FF; --gray-100: #F1F5F9; --gray-200: #E2E8F0;
            --gray-400: #94A3B8; --gray-500: #64748B; --gray-700: #334155; --gray-900: #0F172A;
            --red: #DC2626; --red-light: #FEE2E2;
            --sidebar-w: 220px; --header-h: 60px;
            --radius: 12px; --radius-lg: 16px;
        }
        body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg); color: var(--gray-900); font-size: 14px; -webkit-font-smoothing: antialiased; }

        /* HEADER */
        .header { position: fixed; top: 0; left: 0; right: 0; height: var(--header-h); background: white; border-bottom: 1px solid var(--gray-200); display: flex; align-items: center; justify-content: space-between; padding: 0 24px 0 0; z-index: 200; }
        .header-logo { width: var(--sidebar-w); display: flex; align-items: center; gap: 10px; padding: 0 20px; text-decoration: none; flex-shrink: 0; }
        .logo-icon { width: 30px; height: 30px; background: var(--blue); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .logo-icon svg { width: 15px; height: 15px; fill: white; }
        .logo-text { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; color: var(--gray-900); }
        .logo-text span { color: var(--blue); }
        .avatar-wrap { position: relative; }
        .avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--blue), var(--blue-dark)); display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: white; cursor: pointer; border: 2px solid var(--gray-200); transition: border-color 0.15s; }
        .avatar:hover { border-color: var(--blue); }
        .avatar-dropdown { position: absolute; top: calc(100% + 10px); right: 0; width: 200px; background: white; border: 1px solid var(--gray-200); border-radius: var(--radius); box-shadow: 0 8px 24px rgba(0,0,0,0.1); padding: 6px; opacity: 0; visibility: hidden; transform: translateY(-6px); transition: all 0.15s; z-index: 300; }
        .avatar-wrap:hover .avatar-dropdown { opacity: 1; visibility: visible; transform: translateY(0); }
        .dropdown-header { padding: 10px 10px 8px; border-bottom: 1px solid var(--gray-100); margin-bottom: 4px; }
        .dropdown-name { font-size: 13px; font-weight: 500; color: var(--gray-900); }
        .dropdown-email { font-size: 11px; color: var(--gray-400); margin-top: 2px; }
        .dropdown-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; font-size: 13px; color: var(--gray-700); text-decoration: none; transition: background 0.1s; }
        .dropdown-item:hover { background: var(--gray-100); }
        .dropdown-item.danger { color: var(--red); }
        .dropdown-item svg { width: 14px; height: 14px; fill: currentColor; }

        /* SIDEBAR */
        .sidebar { position: fixed; top: var(--header-h); left: 0; width: var(--sidebar-w); height: calc(100vh - var(--header-h)); background: white; border-right: 1px solid var(--gray-200); padding: 20px 12px; overflow-y: auto; z-index: 100; }
        .nav-section { margin-bottom: 24px; }
        .nav-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--gray-400); padding: 0 10px; margin-bottom: 6px; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 9px; font-size: 13.5px; color: var(--gray-500); text-decoration: none; transition: all 0.15s; margin-bottom: 2px; }
        .nav-item:hover { background: var(--gray-100); color: var(--gray-900); }
        .nav-item.active { background: var(--blue-light); color: var(--blue); font-weight: 500; }
        .nav-item svg { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }

        /* MAIN */
        .main { margin-left: var(--sidebar-w); margin-top: var(--header-h); padding: 32px; min-height: calc(100vh - var(--header-h)); }

        .page-header { margin-bottom: 28px; }
        .page-title { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 700; color: var(--gray-900); margin-bottom: 4px; line-height: 1.3; letter-spacing: -0.01em; }
        .page-subtitle { font-size: 13px; color: var(--gray-400); font-weight: 300; }

        /* CARD */
        .upload-card { background: white; border: 1px solid var(--gray-200); border-radius: var(--radius-lg); padding: 36px; max-width: 600px; }

        .form-group { margin-bottom: 22px; }
        .form-label { display: block; font-size: 13px; font-weight: 500; color: var(--gray-700); margin-bottom: 8px; }

        .form-input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--gray-200); border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--gray-900); outline: none; transition: border-color 0.15s; background: white; }
        .form-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(0,82,255,0.06); }
        .form-input::placeholder { color: var(--gray-400); }

        /* FILE INPUT STYLED */
        .file-input-wrap { position: relative; }
        .file-input-label { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border: 1.5px solid var(--gray-200); border-radius: var(--radius); background: white; cursor: pointer; transition: border-color 0.15s; }
        .file-input-label:hover { border-color: var(--blue); background: var(--blue-light); }
        .file-icon { width: 32px; height: 32px; background: var(--blue-light); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .file-icon svg { width: 15px; height: 15px; fill: var(--blue); }
        .file-text-wrap { flex: 1; }
        .file-cta { font-size: 13px; font-weight: 500; color: var(--blue); }
        .file-hint { font-size: 11px; color: var(--gray-400); font-weight: 300; margin-top: 2px; }
        .file-name-display { font-size: 13px; font-weight: 500; color: var(--gray-700); margin-top: 6px; display: none; }

        input[type="file"] { position: absolute; width: 1px; height: 1px; opacity: 0; overflow: hidden; }

        .field-error { font-size: 12px; color: var(--red); margin-top: 4px; }
        .error-msg { background: #FEF2F2; border: 1px solid #FECACA; border-radius: 9px; padding: 10px 14px; font-size: 13px; color: var(--red); margin-bottom: 20px; }

        .form-actions { display: flex; gap: 10px; justify-content: flex-end; padding-top: 20px; border-top: 1px solid var(--gray-100); margin-top: 4px; }
        .btn-cancel { padding: 10px 22px; background: white; border: 1.5px solid var(--gray-200); border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--gray-500); text-decoration: none; cursor: pointer; transition: all 0.15s; }
        .btn-cancel:hover { border-color: var(--gray-400); color: var(--gray-700); }
        .btn-submit { padding: 10px 28px; background: var(--blue); border: none; border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: white; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(0,82,255,0.25); }
        .btn-submit:hover { background: var(--blue-dark); transform: translateY(-1px); }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <a href="/dashboard" class="header-logo">
        <div class="logo-icon"><svg viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd"/></svg></div>
        <span class="logo-text">Know<span>Vault</span></span>
    </a>
    <div class="avatar-wrap">
        <div class="avatar" th:text="${user != null ? user.username.substring(0,1).toUpperCase() : 'U'}">U</div>
        <div class="avatar-dropdown">
            <div class="dropdown-header">
                <div class="dropdown-name" th:text="${user != null ? user.username : 'User'}">User</div>
                <div class="dropdown-email" th:text="${user != null ? user.email : ''}">user@email.com</div>
            </div>
            <a href="/logout" class="dropdown-item danger">
                <svg viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd"/></svg>
                Sign out
            </a>
        </div>
    </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="nav-section">
        <a href="/dashboard" class="nav-item"><svg viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>Home</a>
        <a href="/documents" class="nav-item"><svg viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd"/></svg>My Documents</a>
        <a href="/history" class="nav-item"><svg viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"/></svg>History</a>
        <a href="/ask" class="nav-item"><svg viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clip-rule="evenodd"/></svg>Ask AI</a>
    </div>
    <div class="nav-section">
        <div class="nav-label">Quick Actions</div>
        <a href="/documents/upload" class="nav-item active"><svg viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM6.293 6.707a1 1 0 010-1.414l3-3a1 1 0 011.414 0l3 3a1 1 0 01-1.414 1.414L11 5.414V13a1 1 0 11-2 0V5.414L7.707 6.707a1 1 0 01-1.414 0z" clip-rule="evenodd"/></svg>Upload Document</a>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <div class="page-header">
        <div class="page-title">Upload Document</div>
        <div class="page-subtitle">Add new documents to your knowledge base</div>
    </div>

    <div class="upload-card">

        <div class="error-msg" th:if="${error}" th:text="${error}"></div>

        <form th:action="@{/documents/upload}" method="post"
              enctype="multipart/form-data" th:object="${form}">

            <!-- Title -->
            <div class="form-group">
                <label class="form-label" for="title">Document Title</label>
                <input class="form-input" type="text" id="title"
                       th:field="*{title}"
                       placeholder="Enter a descriptive title">
                <div class="field-error"
                     th:if="${#fields.hasErrors('title')}"
                     th:errors="*{title}"></div>
            </div>

            <!-- Category -->
            <div class="form-group">
                <label class="form-label" for="category">Category</label>
                <select class="form-input" id="category" th:field="*{category}">
                    <option value="">No category</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.name}"
                            th:text="${cat.name}">Category</option>
                </select>
            </div>

            <!-- File -->
            <div class="form-group">
                <label class="form-label">Upload File</label>
                <div class="file-input-wrap">
                    <label class="file-input-label" for="fileInput">
                        <div class="file-icon">
                            <svg viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM6.293 6.707a1 1 0 010-1.414l3-3a1 1 0 011.414 0l3 3a1 1 0 01-1.414 1.414L11 5.414V13a1 1 0 11-2 0V5.414L7.707 6.707a1 1 0 01-1.414 0z" clip-rule="evenodd"/></svg>
                        </div>
                        <div class="file-text-wrap">
                            <div class="file-cta">Click to select a file</div>
                            <div class="file-hint">PDF, DOC, DOCX, TXT — max 10 MB</div>
                        </div>
                    </label>
                    <input type="file" id="fileInput" name="file"
                           accept=".pdf,.doc,.docx,.txt">
                </div>
                <div class="file-name-display" id="fileNameDisplay"></div>
                <div class="field-error"
                     th:if="${#fields.hasErrors('file')}"
                     th:errors="*{file}"></div>
            </div>

            <!-- Actions -->
            <div class="form-actions">
                <a href="/documents" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-submit">Upload Document</button>
            </div>

        </form>
    </div>
</div>

<script>
    document.getElementById('fileInput').addEventListener('change', function() {
        const display = document.getElementById('fileNameDisplay');
        if (this.files[0]) {
            display.textContent = '📄 ' + this.files[0].name;
            display.style.display = 'block';
        }
    });
</script>

</body>
</html>
