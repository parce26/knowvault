<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error - KnowVault</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .error-box {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
            width: 420px;
        }

        h1 {
            color: #c0392b;
            margin-bottom: 15px;
        }

        p {
            margin-bottom: 25px;
            color: #555;
        }

        a {
            text-decoration: none;
            background: #2c3e50;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
        }

        a:hover {
            background: #1a252f;
        }
    </style>
</head>

<body>

<div class="error-box">

    <h1 th:text="${errorTitle}">Error</h1>

    <p th:text="${errorMessage}">
        Something went wrong.
    </p>

    <a th:href="@{/dashboard}">
        Back to Dashboard
    </a>

</div>

</body>
</html>
