<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KnowVault - Upload Document</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<!-- HEADER -->
<div class="header">
    <a href="/dashboard" class="logo-container">
        <img src="/images/logo.png" alt="KnowVault" class="logo-img">
    </a>
    
    <div class="search-container">
        <span class="search-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
            </svg>
        </span>
        <input type="text" class="search-input" placeholder="Search documents..." id="searchInput">
    </div>
    
    <div class="header-actions">
        <button class="notification-btn">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                <path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6zM10 18a3 3 0 01-3-3h6a3 3 0 01-3 3z"/>
            </svg>
            <span class="notification-badge"></span>
        </button>
        
        <div class="user-avatar-container">
            <div class="user-avatar" id="userAvatar">
                <span id="userInitials">U</span>
                <input type="file" class="avatar-upload" id="avatarUpload" accept="image/*">
            </div>
        </div>
    </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
    <nav class="nav-section">
        <a href="/dashboard" class="nav-item">
            <span class="nav-icon">
                <svg viewBox="0 0 20 20" fill="currentColor">
                    <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/>
                </svg>
            </span>
            <span>Home</span>
        </a>
        
        <a href="/documents" class="nav-item">
            <span class="nav-icon">
                <svg viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd"/>
                </svg>
            </span>
            <span>My Documents</span>
        </a>
        
        <a href="/history" class="nav-item">
            <span class="nav-icon">
                <svg viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"/>
                </svg>
            </span>
            <span>History</span>
        </a>
    </nav>
    
    <div class="nav-section">
        <div class="nav-section-title">Quick Actions</div>
        <a href="/upload" class="nav-item active">
            <span class="nav-icon">
                <svg viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM6.293 6.707a1 1 0 010-1.414l3-3a1 1 0 011.414 0l3 3a1 1 0 01-1.414 1.414L11 5.414V13a1 1 0 11-2 0V5.414L7.707 6.707a1 1 0 01-1.414 0z" clip-rule="evenodd"/>
                </svg>
            </span>
            <span>Upload Document</span>
        </a>
        <a href="/ask" class="nav-item">
            <span class="nav-icon">
                <svg viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clip-rule="evenodd"/>
                </svg>
            </span>
            <span>Ask AI</span>
        </a>
    </div>
</div>

<!-- CONTENIDO PRINCIPAL -->
<div class="main-content">
    
    <!-- Encabezado -->
    <div class="page-header">
        <h1 class="page-title">Upload Document</h1>
        <p class="page-subtitle">Add new documents to your knowledge base</p>
    </div>

    <!-- Formulario de Upload -->
    <div class="content-card">
        
        <!-- Zona de Drag & Drop -->
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">
                <svg width="64" height="64" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM6.293 6.707a1 1 0 010-1.414l3-3a1 1 0 011.414 0l3 3a1 1 0 01-1.414 1.414L11 5.414V13a1 1 0 11-2 0V5.414L7.707 6.707a1 1 0 01-1.414 0z" clip-rule="evenodd"/>
                </svg>
            </div>
            <h3 class="upload-title">Drop your file here</h3>
            <p class="upload-subtitle">or click to browse</p>
            <input type="file" id="fileInput" class="file-input" accept=".pdf,.doc,.docx,.txt">
            <div class="upload-info">Supported formats: PDF, DOC, DOCX, TXT (Max 10MB)</div>
        </div>

        <!-- Preview del archivo -->
        <div class="file-preview" id="filePreview" style="display: none;">
            <div class="file-preview-header">
                <svg width="40" height="40" viewBox="0 0 20 20" fill="currentColor" style="color: var(--primary);">
                    <path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z" clip-rule="evenodd"/>
                </svg>
                <div class="file-preview-info">
                    <div class="file-preview-name" id="fileName"></div>
                    <div class="file-preview-size" id="fileSize"></div>
                </div>
                <button type="button" class="file-preview-remove" onclick="removeFile()">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Formulario de metadata -->
        <form id="uploadForm" action="/documents/upload" method="post" enctype="multipart/form-data">
            
            <div class="form-group">
                <label class="form-label">Document Title</label>
                <input type="text" name="title" class="form-input" placeholder="Enter document title" required>
            </div>

            <div class="form-group">
                <label class="form-label">Category</label>
                <select name="category" class="form-input" required>
                    <option value="">Select a category</option>
                    <option value="technical">Technical Documentation</option>
                    <option value="business">Business Documents</option>
                    <option value="legal">Legal Documents</option>
                    <option value="financial">Financial Reports</option>
                    <option value="hr">Human Resources</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Description (Optional)</label>
                <textarea name="description" class="form-input" rows="4" placeholder="Add a brief description of this document..."></textarea>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-secondary" onclick="window.location.href='/documents'">Cancel</button>
                <button type="submit" class="btn-primary" id="submitBtn" disabled>
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM6.293 6.707a1 1 0 010-1.414l3-3a1 1 0 011.414 0l3 3a1 1 0 01-1.414 1.414L11 5.414V13a1 1 0 11-2 0V5.414L7.707 6.707a1 1 0 01-1.414 0z" clip-rule="evenodd"/>
                    </svg>
                    <span>Upload Document</span>
                </button>
            </div>

        </form>

    </div>

</div>

<!-- BOTÓN FLOTANTE DE IA -->
<button class="ai-fab" onclick="toggleAIChat()">AI</button>

<!-- POPUP DEL CHAT -->
<div class="ai-chat-popup" id="aiChatPopup">
    <div class="chat-header">
        <h3 class="chat-title">KnowVault Assist</h3>
        <button class="chat-close" onclick="toggleAIChat()">×</button>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="chat-message ai">
            Hello! I'm KnowVault Assist. Need help uploading your document?
        </div>
    </div>
    <div class="chat-input-area">
        <div class="chat-input-wrapper">
            <input type="text" class="chat-input" placeholder="Ask me anything..." id="chatInput">
            <button class="chat-send" onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<!-- JAVASCRIPT -->
<script>
// Drag & Drop functionality
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const filePreview = document.getElementById('filePreview');
const submitBtn = document.getElementById('submitBtn');
let selectedFile = null;

// Click para abrir selector
uploadArea.addEventListener('click', () => fileInput.click());

// Drag & drop events
uploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadArea.style.borderColor = 'var(--primary)';
    uploadArea.style.background = 'var(--primary-light)';
});

uploadArea.addEventListener('dragleave', () => {
    uploadArea.style.borderColor = 'var(--gray-300)';
    uploadArea.style.background = 'white';
});

uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.style.borderColor = 'var(--gray-300)';
    uploadArea.style.background = 'white';
    
    const files = e.dataTransfer.files;
    if (files.length > 0) {
        handleFile(files[0]);
    }
});

// File input change
fileInput.addEventListener('change', (e) => {
    if (e.target.files.length > 0) {
        handleFile(e.target.files[0]);
    }
});

// Manejar archivo seleccionado
function handleFile(file) {
    // Validar tamaño (10MB)
    if (file.size > 10 * 1024 * 1024) {
        alert('File size exceeds 10MB limit');
        return;
    }
    
    selectedFile = file;
    
    // Mostrar preview
    document.getElementById('fileName').textContent = file.name;
    document.getElementById('fileSize').textContent = formatFileSize(file.size);
    
    uploadArea.style.display = 'none';
    filePreview.style.display = 'flex';
    submitBtn.disabled = false;
}

// Remover archivo
function removeFile() {
    selectedFile = null;
    fileInput.value = '';
    uploadArea.style.display = 'flex';
    filePreview.style.display = 'none';
    submitBtn.disabled = true;
}

// Formatear tamaño de archivo
function formatFileSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
}

// AI Chat
function toggleAIChat() {
    document.getElementById('aiChatPopup').classList.toggle('active');
}

function sendMessage() {
    const input = document.getElementById('chatInput');
    const messagesContainer = document.getElementById('chatMessages');
    
    if (input.value.trim() === '') return;
    
    const userMessage = document.createElement('div');
    userMessage.className = 'chat-message user';
    userMessage.textContent = input.value;
    messagesContainer.appendChild(userMessage);
    
    setTimeout(() => {
        const aiMessage = document.createElement('div');
        aiMessage.className = 'chat-message ai';
        aiMessage.textContent = 'This is a placeholder response. The Claude API integration will be implemented here.';
        messagesContainer.appendChild(aiMessage);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }, 500);
    
    input.value = '';
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

document.getElementById('chatInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') sendMessage();
});

// Avatar
document.getElementById('avatarUpload').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
            const avatar = document.getElementById('userAvatar');
            const initials = document.getElementById('userInitials');
            initials.style.display = 'none';
            const img = document.createElement('img');
            img.src = event.target.result;
            avatar.appendChild(img);
            localStorage.setItem('userAvatar', event.target.result);
        };
        reader.readAsDataURL(file);
    }
});

window.addEventListener('DOMContentLoaded', function() {
    const savedAvatar = localStorage.getItem('userAvatar');
    if (savedAvatar) {
        const avatar = document.getElementById('userAvatar');
        const initials = document.getElementById('userInitials');
        initials.style.display = 'none';
        const img = document.createElement('img');
        img.src = savedAvatar;
        avatar.appendChild(img);
    }
});
</script>

</body>
</html>
